# ──────────────────────────────────────────────────────────────────────────────
# ZygoTrip CI Pipeline
# Runs on every push / PR: test → lint → security scan → build
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Django backend tests ─────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: zygotrip_test
          POSTGRES_USER: zygotrip_user
          POSTGRES_PASSWORD: zygotrip_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zygotrip_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      SECRET_KEY: ci-testing-secret-key-not-for-production
      POSTGRES_DB: zygotrip_test
      POSTGRES_USER: zygotrip_user
      POSTGRES_PASSWORD: zygotrip_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      REDIS_HOST: localhost
      USE_REDIS_CACHE: "false"
      ELASTICSEARCH_HOST: ""
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov coverage

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests with coverage
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q \
            --junitxml=test-results/junit.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/

  # ── 2. Django code quality ──────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy django-stubs

      - name: Ruff lint
        run: ruff check apps/ zygotrip_project/ --output-format=github

      - name: Ruff format check
        run: ruff format --check apps/ zygotrip_project/

  # ── 3. Frontend tests ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Run unit tests
        run: npm test -- --watchAll=false --coverage --passWithNoTests

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_CDN_URL: ""
          NEXT_PUBLIC_S3_BUCKET: ""
          BACKEND_URL: http://localhost:8000

  # ── 4. Security scan ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Python dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json -o pip-audit.json || true
          pip-audit -r requirements.txt

      - name: Bandit (Python security linter)
        run: |
          pip install bandit[toml]
          bandit -r apps/ zygotrip_project/ \
            -x apps/*/tests/ \
            -ll \
            -f json \
            -o bandit-report.json || true
          bandit -r apps/ zygotrip_project/ -x apps/*/tests/ -ll

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
          exit-code: 0   # informational — don't block CI

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── 5. Docker build validation ──────────────────────────────────────────────
  docker-build:
    name: Docker Build (Validate)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: zygotrip/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.frontend
          push: false
          tags: zygotrip/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
