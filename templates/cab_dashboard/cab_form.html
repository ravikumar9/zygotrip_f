{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="ota-container auth-container">
    <div class="card auth-card">
      <h1 class="mb-4">Add Cab</h1>
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="auth-label">Registration Number</label>
          <input type="text" name="registration_number" required />
        </div>
        <div class="mb-4">
          <label class="auth-label">Vehicle Type</label>
          <select name="vehicle_type" required>
            <option value="sedan">Sedan</option>
            <option value="suv">SUV</option>
            <option value="hatchback">Hatchback</option>
            <option value="luxury">Luxury</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="auth-label">Base Fare</label>
          <input type="number" name="base_fare" required />
        </div>
        <div class="mb-4">
          <label class="auth-label">Rate Per KM</label>
          <input type="number" name="rate_per_km" required />
        </div>
        <div class="mb-4">
          <label class="auth-label">Cab Name</label>
          {{ form.name }}
        </div>
        <div class="mb-4">
          <label class="auth-label">City</label>
          {{ form.city }}
        </div>
        <div class="mb-4">
          <label class="auth-label">Seats</label>
          {{ form.seats }}
        </div>
        <div class="mb-4">
          <label class="auth-label">Fuel Type</label>
          {{ form.fuel_type }}
        </div>
        <div class="mb-4">
          <label class="auth-label">Base Price Per KM</label>
          {{ form.base_price_per_km }}
        </div>
        <button type="submit" class="btn btn-primary w-full">Create Cab</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
