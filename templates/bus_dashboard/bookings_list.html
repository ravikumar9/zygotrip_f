{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="ota-container">
    <h1 class="mb-4">Bus Bookings</h1>
    {% if bookings %}
      <div class="grid grid-cols-1 gap-4">
        {% for booking in bookings %}
          <div class="card">
            <h3 class="card-title">Booking #{{ booking.id }}</h3>
            <p class="">{{ booking.bus.registration_number }} - {{ booking.status }}</p>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <div class="card text-center p-6">
        <p class="">No bookings yet.</p>
      </div>
    {% endif %}
  </div>
</section>
{% endblock %}
