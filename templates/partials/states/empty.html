{# PHASE 9: Empty state component #}
<div class="flex items-center justify-center py-12">
    <div class="text-center">
        <svg class="mx-auto h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <h3 class="mt-4 text-lg font-medium">{{ empty_title|default:"No results found" }}</h3>
        <p class="mt-2">{{ empty_message|default:"Try adjusting your filters or search query" }}</p>
        {% if empty_action_url %}
            <a href="{{ empty_action_url }}" class="mt-4 inline-block px-6 py-2 rounded-lg">
                {{ empty_action_label|default:"Browse all" }}
            </a>
        {% endif %}
    </div>
</div>
