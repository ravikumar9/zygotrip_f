<header class="site-header">
  <nav class="site-nav">
    <a href="{% url 'core:home' %}" class="site-logo">Zygotrip</a>
    
    <div class="site-nav-links">
      <a href="{% url 'core:home' %}" class="nav-link">Home</a>
      <a href="{% url 'hotels:listing' %}" class="nav-link">Hotels</a>
      <a href="{% url 'buses:list' %}" class="nav-link">Buses</a>
      <a href="{% url 'cabs:list' %}" class="nav-link">Cabs</a>
      <a href="{% url 'packages:list' %}" class="nav-link">Packages</a>
      <a href="{% url 'flights:list' %}" class="nav-link">Flights</a>
      <a href="{% url 'trains:list' %}" class="nav-link">Trains</a>
    </div>
    
    <div class="site-nav-actions">
      {% if user.is_authenticated %}
        <span class="nav-user">{{ user.full_name|default:user.email }}</span>
        {% if user.is_staff %}
          <a href="/admin/" class="nav-link-action">Admin</a>
        {% endif %}
        <a href="{% url 'account_logout' %}" class="btn btn-primary btn-sm">Logout</a>
      {% else %}
        <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm">Login</a>
        <a href="{% url 'account_register' %}" class="btn btn-primary btn-sm">Register</a>
      {% endif %}
    </div>
  </nav>
</header>
