{# PHASE 9: Error state component #}
<div class="border rounded-lg p-6 mb-6">
    <div class="flex">
        <div class="flex-shrink-0">
            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
            </svg>
        </div>
        <div class="ml-3">
            <h3 class="text-sm font-medium">{{ error_title|default:"Error" }}</h3>
            <p class="mt-1 text-sm">{{ error_message|default:"Something went wrong. Please try again." }}</p>
            {% if error_action_url %}
                <div class="mt-4">
                    <a href="{{ error_action_url }}" class="text-sm font-medium">
                        {{ error_action_label|default:"Try again" }}
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</div>
