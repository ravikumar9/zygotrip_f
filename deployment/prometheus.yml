global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'django'
    metrics_path: '/api/v1/metrics/'
    static_configs:
      - targets: ['web:8000']
        labels:
          service: 'zygotrip-web'

  - job_name: 'celery'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'zygotrip-celery'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'zygotrip-redis'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'zygotrip-postgres'

  - job_name: 'elasticsearch'
    metrics_path: '/_prometheus/metrics'
    static_configs:
      - targets: ['elasticsearch:9200']
        labels:
          service: 'zygotrip-elasticsearch'
