# ============================================================
# ZygoTrip — Critical Celery Worker Deployment
# ============================================================
# Handles time-sensitive, transactional queues:
#   bookings   — booking state machine transitions
#   payments   — payment gateway callbacks, refunds
#   inventory  — holds, releases, atomic reservation ops
#   events     — domain events that trigger downstream side-effects
#
# Design rationale:
#   - NEVER mix these queues with notifications/search to ensure
#     a notification storm cannot delay booking confirmations.
#   - concurrency=8 matches docker-compose setting; tune up/down
#     based on CPU core count of the node pool.
#   - acks_late=true (set in ConfigMap) means a task is
#     re-queued if the worker crashes mid-execution — safe
#     for idempotent booking/payment tasks.
#   - prefetch=1 (set in ConfigMap) prevents a single worker
#     from hoarding unprocessed tasks.
#
# HPA (celery-critical-hpa.yaml) scales 2 → 10 replicas.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-critical
  namespace: zygotrip
  labels:
    app.kubernetes.io/name: celery-critical
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: zygotrip-platform
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: kubectl
    worker-tier: critical
  annotations:
    description: "Celery worker — bookings, payments, inventory, events queues"
spec:
  # Minimum 2 replicas for HA; HPA adjusts from here
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: celery-critical
      app.kubernetes.io/component: worker

  # Rolling update: keep at least 1 replica running at all times
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app.kubernetes.io/name: celery-critical
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: zygotrip-platform
        worker-tier: critical
      annotations:
        # Prometheus scraping for Celery metrics (flower exposes these,
        # or use celery-prometheus-exporter sidecar)
        prometheus.io/scrape: "false"

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: zygotrip-celery

      # ── Wait for broker and database before starting ───────────
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis broker..."; sleep 2;
              done
              echo "Redis ready."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
              echo "PostgreSQL ready."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

      containers:
        - name: celery-critical
          image: zygotrip/web:latest
          imagePullPolicy: Always

          # Worker name uses pod hostname for unique identification in Flower
          # Queues: bookings, payments, inventory, events
          command:
            - celery
            - -A
            - zygotrip_project
            - worker
            - --loglevel=info
            - --concurrency=8
            - --queues=bookings,payments,inventory,events
            - --hostname=critical@%(h)s
            - --without-gossip
            - --without-mingle
            # Max tasks per child prevents memory leaks in long-running workers
            - --max-tasks-per-child=500

          # ── Resources ─────────────────────────────────────────
          # More CPU than the standard worker due to concurrency=8
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          envFrom:
            - configMapRef:
                name: zygotrip-config

          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: DJANGO_SECRET_KEY
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: POSTGRES_PASSWORD
            - name: CASHFREE_APP_ID
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: CASHFREE_APP_ID
            - name: CASHFREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: CASHFREE_SECRET_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: PAYTM_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: PAYTM_MERCHANT_ID
            - name: PAYTM_MERCHANT_KEY
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: PAYTM_MERCHANT_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: SENTRY_DSN
            - name: FCM_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: zygotrip-secrets
                  key: FCM_SERVER_KEY

          # ── Liveness probe — detect zombie workers ─────────────
          # Celery inspect ping verifies the worker event loop is live.
          # A zombie worker (alive process, dead event loop) will fail
          # this check and be restarted.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >
                  celery -A zygotrip_project inspect ping
                  -d "critical@$(hostname)"
                  --timeout 10
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

      volumes:
        - name: tmp
          emptyDir: {}

      # Anti-affinity: spread critical workers across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: celery-critical
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 120

---
# ============================================================
# ServiceAccount for Celery workers (shared by both tiers)
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zygotrip-celery
  namespace: zygotrip
  labels:
    app.kubernetes.io/name: celery
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: zygotrip-platform
automountServiceAccountToken: false
