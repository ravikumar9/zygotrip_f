# ============================================================
# ZygoTrip — HPA for Critical Celery Worker Deployment
# ============================================================
# Scales the celery-critical Deployment between 2 and 10 replicas.
#
# Unlike web pods (HTTP-driven), Celery worker scaling is ideally
# queue-depth-driven using KEDA (Kubernetes Event-Driven Autoscaling):
#
#   KEDA ScaledObject example (recommended — replace this HPA):
#   ---
#   apiVersion: keda.sh/v1alpha1
#   kind: ScaledObject
#   metadata:
#     name: celery-critical-scaledobject
#     namespace: zygotrip
#   spec:
#     scaleTargetRef:
#       name: celery-critical
#     minReplicaCount: 2
#     maxReplicaCount: 10
#     triggers:
#       - type: redis
#         metadata:
#           address: redis-service:6379
#           listName: bookings   # Celery uses LPUSH/BRPOP on queue lists
#           listLength: "50"     # Scale up when >50 tasks are queued
#           databaseIndex: "0"
#
# Until KEDA is available, this HPA uses CPU utilisation as a proxy
# for queue depth (high CPU = workers are processing many tasks).
#
# Scaling rationale:
#   - min=2: HA — one pod can drain while the other handles tasks
#   - max=10: 10 pods × 8 concurrency = 80 concurrent task slots
#   - CPU 70%: workers consuming 350m (of 500m request) → add more
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-critical-hpa
  namespace: zygotrip
  labels:
    app.kubernetes.io/name: celery-critical-hpa
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/part-of: zygotrip-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "HPA for critical Celery worker — CPU 70%, 2–10 replicas"
    recommendation: "Replace with KEDA ScaledObject for queue-depth-based scaling"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-critical

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Celery workers at 70% CPU means they are under sustained load
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          # Scale before approaching the 2Gi limit
          averageUtilization: 75

  behavior:
    scaleUp:
      # Scale up quickly when the bookings/payments queues are backed up
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      # Wait 10 minutes before scaling down to avoid worker churn
      # (Celery workers should finish their current task batch)
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
