# ============================================================
# ZygoTrip — Kubernetes Secrets (template with placeholders)
# ============================================================
#
# IMPORTANT — DO NOT COMMIT REAL VALUES TO GIT.
# This file contains base64-encoded placeholder strings.
# Replace every <PLACEHOLDER> value before applying.
#
# How to base64-encode a value (Linux/macOS):
#   echo -n "my-actual-value" | base64
#
# How to apply:
#   kubectl apply -f k8s/secrets.yaml
#
# Production recommendation: Use a secrets manager instead of
# storing values in this file at all:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + Vault Agent Injector
#   - Sealed Secrets (kubeseal) for GitOps
#
# The "stringData" field accepts plain text (K8s auto-encodes).
# Switch to "data" with base64 values once real secrets are set.
#
# All placeholder values below are the string "CHANGEME" encoded:
#   echo -n "CHANGEME" | base64  →  Q0hBTkdFTUU=
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: zygotrip-secrets
  namespace: zygotrip
  labels:
    app.kubernetes.io/name: zygotrip
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: zygotrip-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Remind operators this secret must be populated before first deploy
    note: "Replace all CHANGEME placeholders with real base64-encoded values"
type: Opaque
data:
  # ── Django ───────────────────────────────────────────────────
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(50))"
  # then base64-encode the result
  DJANGO_SECRET_KEY: Q0hBTkdFTUU=          # CHANGEME

  # ── PostgreSQL credentials ───────────────────────────────────
  # Must match what the PostgreSQL StatefulSet / RDS instance uses
  POSTGRES_USER: Q0hBTkdFTUU=              # CHANGEME  e.g. zygotrip_user
  POSTGRES_PASSWORD: Q0hBTkdFTUU=          # CHANGEME  strong random password
  # Full DSN used by Django DATABASE_URL if preferred
  DATABASE_URL: Q0hBTkdFTUU=              # CHANGEME  postgres://user:pass@postgres-service:5432/zygotrip_db

  # ── Payment gateways ────────────────────────────────────────
  # Cashfree
  CASHFREE_APP_ID: Q0hBTkdFTUU=            # CHANGEME
  CASHFREE_SECRET_KEY: Q0hBTkdFTUU=        # CHANGEME
  # Stripe
  STRIPE_SECRET_KEY: Q0hBTkdFTUU=          # CHANGEME  sk_live_...
  STRIPE_WEBHOOK_SECRET: Q0hBTkdFTUU=      # CHANGEME  whsec_...
  # Paytm UPI
  PAYTM_MERCHANT_ID: Q0hBTkdFTUU=          # CHANGEME
  PAYTM_MERCHANT_KEY: Q0hBTkdFTUU=         # CHANGEME

  # ── Firebase Cloud Messaging (push notifications) ────────────
  FCM_PROJECT_ID: Q0hBTkdFTUU=             # CHANGEME
  FCM_SERVER_KEY: Q0hBTkdFTUU=             # CHANGEME
  # Path to service account JSON (mount as volume if needed)
  GOOGLE_APPLICATION_CREDENTIALS_JSON: Q0hBTkdFTUU=  # CHANGEME  base64(json)

  # ── WhatsApp Business API ────────────────────────────────────
  WHATSAPP_ACCESS_TOKEN: Q0hBTkdFTUU=      # CHANGEME
  WHATSAPP_PHONE_NUMBER_ID: Q0hBTkdFTUU=   # CHANGEME

  # ── SMS — MSG91 ──────────────────────────────────────────────
  MSG91_AUTH_KEY: Q0hBTkdFTUU=             # CHANGEME
  MSG91_TEMPLATE_ID: Q0hBTkdFTUU=          # CHANGEME

  # ── Monitoring ───────────────────────────────────────────────
  SENTRY_DSN: Q0hBTkdFTUU=                 # CHANGEME  https://...@sentry.io/...
  # Grafana admin password
  GRAFANA_ADMIN_PASSWORD: Q0hBTkdFTUU=     # CHANGEME

  # ── Supplier webhook secrets ─────────────────────────────────
  SUPPLIER_HOTELBEDS_WEBHOOK_SECRET: Q0hBTkdFTUU=   # CHANGEME
  SUPPLIER_STAAH_WEBHOOK_SECRET: Q0hBTkdFTUU=       # CHANGEME

  # ── Email (SMTP) ─────────────────────────────────────────────
  EMAIL_HOST: Q0hBTkdFTUU=                 # CHANGEME  smtp.sendgrid.net
  EMAIL_PORT: NTg3                         # 587 in base64
  EMAIL_HOST_USER: Q0hBTkdFTUU=            # CHANGEME
  EMAIL_HOST_PASSWORD: Q0hBTkdFTUU=        # CHANGEME  SMTP API key
  DEFAULT_FROM_EMAIL: Q0hBTkdFTUU=         # CHANGEME  noreply@zygotrip.com

  # ── AWS S3 (media storage) ───────────────────────────────────
  # Only required if using S3 for user-uploaded media files
  AWS_ACCESS_KEY_ID: Q0hBTkdFTUU=          # CHANGEME  (optional)
  AWS_SECRET_ACCESS_KEY: Q0hBTkdFTUU=      # CHANGEME  (optional)
  AWS_STORAGE_BUCKET_NAME: Q0hBTkdFTUU=    # CHANGEME  (optional)
  AWS_S3_REGION_NAME: Q0hBTkdFTUU=         # CHANGEME  ap-south-1 (optional)
