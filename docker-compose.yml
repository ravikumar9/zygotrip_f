services:

  redis:
    image: redis:7-alpine
    container_name: zygotrip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 640M
    networks:
      - zygotrip_network


  postgres:
    image: postgres:15-alpine
    container_name: zygotrip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zygotrip_db}
      POSTGRES_USER: ${POSTGRES_USER:-zygotrip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zygotrip_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zygotrip_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - zygotrip_network


  web:
    build: .
    container_name: zygotrip_web
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn zygotrip_project.wsgi:application --config deployment/gunicorn.conf.py
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
      ELASTICSEARCH_HOST: elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - zygotrip_network


  # ── Critical worker: bookings, payments, inventory ─────────────────
  # High concurrency — handles time-sensitive transactional tasks.
  # These queues must NEVER be starved by low-priority notification bursts.
  celery_worker_critical:
    build: .
    container_name: zygotrip_celery_critical
    restart: unless-stopped
    command: >
      celery -A zygotrip_project worker
      -l info
      --concurrency=8
      -Q bookings,payments,inventory,events
      -n critical@%h
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
    healthcheck:
      test: ["CMD-SHELL", "celery -A zygotrip_project inspect ping -d critical@$(hostname) --timeout 10 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - zygotrip_network


  # ── Standard worker: notifications, search, analytics, default ─────
  # Lower concurrency — handles background/non-urgent tasks.
  # Isolated so a notification storm cannot delay booking confirmations.
  celery_worker:
    build: .
    container_name: zygotrip_celery_worker
    restart: unless-stopped
    command: >
      celery -A zygotrip_project worker
      -l info
      --concurrency=4
      -Q notifications,search,default
      -n standard@%h
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
    healthcheck:
      test: ["CMD-SHELL", "celery -A zygotrip_project inspect ping -d standard@$(hostname) --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - zygotrip_network


  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: zygotrip_celery_beat
    restart: unless-stopped
    command: celery -A zygotrip_project beat -l info --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_HOST: redis
      USE_REDIS_CACHE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - zygotrip_network


  # ── Celery Flower (monitoring dashboard) ───────────────────────────
  flower:
    build: .
    container_name: zygotrip_flower
    restart: unless-stopped
    command: celery -A zygotrip_project flower --port=5555 --broker_api=redis://redis:6379/0 --basic_auth=admin:ZygoFlower@2026
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "admin:ZygoFlower@2026", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: zygotrip_project.settings
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - zygotrip_network


  # ── ElasticSearch (search engine) ──────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: zygotrip_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "celery -A zygotrip_project inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - zygotrip_network


  # ── Prometheus (metrics collection) ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: zygotrip_prometheus
    restart: unless-stopped
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - zygotrip_network


  # ── Grafana (dashboards & alerting) ────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: zygotrip_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - zygotrip_network


volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  es_data:
  prometheus_data:
  grafana_data:


networks:
  zygotrip_network:
    driver: bridge
