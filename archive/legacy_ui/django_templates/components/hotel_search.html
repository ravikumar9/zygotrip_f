<div class="search-card">
  <form method="get" action="{% url 'hotels:listing' %}" class="search-form" data-search-form data-autocomplete-submit="true">
    <div class="search-form-group">
      <div class="search-form-field relative">
        <label for="hotel-location" class="text-[11px] uppercase tracking-wider text-gray-500">Where to</label>
        <input
          type="text"
          id="hotel-location"
          name="q"
          placeholder="City or property"
          value="{{ request.GET.q|default:'' }}"
          autocomplete="off"
          data-autocomplete="search"
          aria-expanded="false"
          aria-controls="hotel-location-list"
          class="text-[16px] h-12"
        />
        <input type="hidden" name="location" value="{{ request.GET.location|default:'' }}" />
        <input type="hidden" name="city" value="{{ request.GET.city|default:'' }}" />
        <div class="search-suggestions" data-autocomplete-list id="hotel-location-list" hidden></div>
      </div>
      <div class="search-form-field">
        <label for="hotel-checkin" class="text-[11px] uppercase tracking-wider text-gray-500">Check-in</label>
        <input type="date" id="hotel-checkin" name="checkin" value="{{ request.GET.checkin|default:'' }}" />
      </div>
      <div class="search-form-field">
        <label for="hotel-checkout" class="text-[11px] uppercase tracking-wider text-gray-500">Check-out</label>
        <input type="date" id="hotel-checkout" name="checkout" value="{{ request.GET.checkout|default:'' }}" />
      </div>
      <div class="search-form-field">
        <label for="hotel-guests" class="text-[11px] uppercase tracking-wider text-gray-500">Guests</label>
        <select id="hotel-guests" name="guests">
          <option value="1" {% if request.GET.guests == "1" %}selected{% endif %}>1 Guest</option>
          <option value="2" {% if request.GET.guests == "2" %}selected{% endif %}>2 Guests</option>
          <option value="3" {% if request.GET.guests == "3" %}selected{% endif %}>3 Guests</option>
          <option value="4" {% if request.GET.guests == "4" %}selected{% endif %}>4 Guests</option>
        </select>
      </div>
      <div class="search-form-field">
        <button type="submit" class="btn btn-primary primary-button h-[52px] min-w-[160px] rounded-xl text-[15px]">Search Hotels</button>
      </div>
    </div>
  </form>
</div>
