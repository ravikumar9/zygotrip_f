{# PHASE 10: Visual hierarchy - rating display #}
{% if rating is not None %}
  <div class="hotel-rating flex items-center gap-2 mt-2">
    <div class="flex items-center gap-1">
      {% for i in"12345" %}
        {% if i|add:"0" <= rating %}
          <span class="">★</span>
        {% else %}
          <span class="">★</span>
        {% endif %}
      {% endfor %}
    </div>
    <span class="font-semibold">{{ rating|floatformat:1 }}</span>
    {% if review_count %}
      <span class="text-sm">({{ review_count }} reviews)</span>
    {% endif %}
  </div>
{% endif %}
