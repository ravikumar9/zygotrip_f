<!-- REUSABLE COMPONENT: Rating Stars -->
<!-- Usage: {% include 'partials/rating_stars.html' with rating=4.5 count=128 %} -->

<div class="card-rating">
  <div class="rating-stars">
    {% for i in"12345" %}
      {% if forloop.counter <= rating %}
        <span class="star filled">★</span>
      {% else %}
        <span class="star empty">★</span>
      {% endif %}
    {% endfor %}
  </div>
  <span class="card-rating-value">{{ rating }}</span>
  {% if count %}
  <span class="card-rating-count">({{ count }} reviews)</span>
  {% endif %}
</div>
