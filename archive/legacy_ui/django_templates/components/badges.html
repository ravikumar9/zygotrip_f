{# PHASE 4: Offer badges with color variants #}
{% if badges %}
  <div class="hotel-tags flex flex-wrap gap-2 mb-3">
    {% for badge in badges %}
      <span class="badge badge-{{ badge.variant|default:'info' }} inline-block px-3 py-1 rounded-full text-sm font-medium
        {% if badge.variant == 'success' %}bg-green-100{% elif badge.variant == 'danger' %}bg-red-100{% elif badge.variant == 'warning' %}bg-yellow-100{% else %}bg-blue-100{% endif %}">
        {{ badge.label }}
      </span>
    {% endfor %}
  </div>
{% endif %}
