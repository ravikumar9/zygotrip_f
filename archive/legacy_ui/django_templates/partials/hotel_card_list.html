{% if results %}
  <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for item in results %}
      <div class="rounded-xl shadow-sm p-6 flex justify-between items-start hover:shadow-md transition">
        <div>
          <h3 class="text-lg font-semibold">{{ item.name }}</h3>
          <p class="text-sm">{{ item.city }}, India</p>

          <div class="mt-3">
            <span class="inline-block text-xs font-semibold px-3 py-1 rounded-full">
              {{ item.rating }}
            </span>
          </div>
        </div>

        {% if item.verified %}
        <span class="text-xs px-3 py-1 rounded-full">
          Verified
        </span>
        {% endif %}
      </div>
    {% endfor %}
  </section>
{% endif %}
